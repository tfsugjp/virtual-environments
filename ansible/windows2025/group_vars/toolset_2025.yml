---
# Single source of truth: ansible/windows2025/toolsets/toolset-2025.json
#
# NOTE: This file is controller-read (lookup('file', ...)) and then parsed.
#       windows_base also copies this exact file to {{ image_folder }}\toolset.json
#       so controller-side parsing and target-side installs stay in sync.

# Path to toolset JSON (kept within ansible-windows2025 so the playbook can run standalone)
_toolset_source_path: "{{ playbook_dir }}/../toolsets/toolset-2025.json"

# Parsed toolset object
# (Use json_query or direct dict access throughout roles.)
toolset: "{{ lookup('file', _toolset_source_path) | from_json }}"
