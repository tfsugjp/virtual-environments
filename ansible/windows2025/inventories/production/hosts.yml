---
all:
  children:
    windows:
      children:
        windows2025_builders:
          hosts:
            win2025-build-01:
              ansible_host: 10.0.1.200
              ansible_user: ansible
              ansible_password: "{{ vault_ansible_password }}"
              ansible_connection: winrm
              ansible_winrm_transport: ntlm
              ansible_winrm_server_cert_validation: ignore
              ansible_port: 5986

        windows2025_agents:
          hosts:
            agent-win-01:
              ansible_host: 10.0.2.200
              ansible_user: ansible
              ansible_password: "{{ vault_ansible_password }}"
              ansible_connection: winrm
              ansible_winrm_transport: ntlm
              ansible_winrm_server_cert_validation: ignore
              ansible_port: 5986
              azp_agent_instances:
                - { name: "agent-01" }
                - { name: "agent-02" }
